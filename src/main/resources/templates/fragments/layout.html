<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:fragment="layout (title, content)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}"><span th:text="${storeName}"></span></title>

    <!-- Bootstrap CSS Global -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- CSS Adicional Global -->
    <link rel="stylesheet" th:href="@{/css/contract.css}" />
    <link rel="stylesheet" th:href="@{/css/landing.css}" />
</head>

<body class="text-dark font-monospace pt-5 mt-5">

    <!-- Global Vaporware Navbar -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- Contenido inyectado desde otras plantillas -->
    <div th:replace="${content}"></div>

    <!-- Bootstrap JS Global -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <!-- Script Adicional Global -->
    <script th:src="@{/js/contract.js}"></script>

</body>

</html>
